<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>尾多多 3C 产品目录 | WeiDuoDuo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E63946;
      --red-dark: #c1121f;
      --gold: #FFB703;
      --bg: #0A0A0F;
      --surface: #13131A;
      --surface2: #1C1C26;
      --border: rgba(255,255,255,0.07);
      --text: #F0F0F0;
      --muted: #888899;
      --card-hover: #1E1E2A;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 5vw;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em;
      color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .logo-badge {
      background: var(--red);
      color: #fff;
      font-size: 0.55rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 3px 7px; border-radius: 4px;
      text-transform: uppercase;
    }
    nav { display: flex; gap: 4px; }
    nav a {
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; padding: 6px 14px; border-radius: 8px;
      transition: all 0.2s;
    }
    nav a:hover, nav a.active { color: var(--text); background: var(--surface2); }
    .admin-btn {
      background: var(--surface2);
      color: var(--muted) !important;
      border: 1px solid var(--border) !important;
      font-size: 0.8rem !important;
      transition: all 0.2s !important;
    }
    .admin-btn:hover { color: var(--gold) !important; border-color: var(--gold) !important; }

    /* ── HERO ── */
    .hero {
      padding: 80px 5vw 60px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -120px; right: -100px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(230,57,70,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em;
      color: var(--red); text-transform: uppercase; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .hero-eyebrow::before { content: ''; display: block; width: 32px; height: 1px; background: var(--red); }
    h1 {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 900; line-height: 1.1; letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    h1 span { color: var(--red); }
    .hero-sub {
      font-size: 1rem; color: var(--muted); max-width: 480px; line-height: 1.6;
      margin-bottom: 32px;
    }
    .hero-stats {
      display: flex; gap: 40px; flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; }

    /* ── FILTERS ── */
    .filters-bar {
      padding: 0 5vw 24px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1; min-width: 220px; max-width: 340px; position: relative;
    }
    .search-wrap input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 10px 16px 10px 40px;
      font-size: 0.9rem; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--red); }
    .search-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; }
    .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .filt {
      padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .filt:hover { border-color: rgba(230,57,70,0.4); color: var(--text); }
    .filt.active { background: var(--red); border-color: var(--red); color: #fff; }
    .sort-select {
      margin-left: auto; background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; padding: 8px 12px;
      font-size: 0.82rem; font-family: inherit; outline: none; cursor: pointer;
    }

    /* ── GRID ── */
    .grid {
      padding: 0 5vw 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ── PRODUCT CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      cursor: pointer; position: relative;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      animation: fadeUp 0.4s ease both;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(230,57,70,0.3);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(230,57,70,0.1);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-img {
      height: 160px; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; position: relative;
      border-bottom: 1px solid var(--border);
    }
    .card-img::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(230,57,70,0.05) 0%, transparent 70%);
    }
    .badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em;
      padding: 3px 8px; border-radius: 6px; text-transform: uppercase;
    }
    .badge-new { background: var(--red); color: #fff; }
    .badge-hot { background: var(--gold); color: #000; }
    .badge-premium { background: linear-gradient(135deg, #8B5CF6, #6366F1); color: #fff; }
    .badge-inquiry { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .card-body { padding: 16px; }
    .card-id { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; font-family: 'Space Grotesk', sans-serif; }
    .card-name-zh { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
    .card-name-en { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; line-height: 1.3; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px;
    }
    .price {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem; font-weight: 700; color: var(--red);
    }
    .price sup { font-size: 0.7rem; vertical-align: super; }
    .price-tbd { font-size: 0.8rem; color: var(--muted); font-style: italic; }
    .unit-tag {
      font-size: 0.7rem; color: var(--muted); background: var(--surface2);
      padding: 3px 8px; border-radius: 6px;
    }
    .no-results {
      grid-column: 1/-1; text-align: center; padding: 80px 0;
      color: var(--muted); font-size: 1rem;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; max-width: 480px; width: 100%;
      padding: 32px; position: relative;
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--surface2); border: none; border-radius: 8px;
      color: var(--muted); width: 32px; height: 32px;
      font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .modal-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .modal-zh { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .modal-en { font-size: 0.9rem; color: var(--muted); margin-bottom: 20px; }
    .modal-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .modal-row:last-of-type { border-bottom: none; }
    .modal-label { color: var(--muted); }
    .modal-val { font-weight: 600; }
    .modal-price { font-size: 2rem; font-weight: 800; color: var(--red); font-family: 'Space Grotesk', sans-serif; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 5vw;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    footer .copy { font-size: 0.8rem; color: var(--muted); }
    footer .ship { font-size: 0.8rem; color: var(--muted); }
    footer .ship span { color: var(--gold); font-weight: 600; }

    @media (max-width: 600px) {
      nav a:not(.admin-btn) { display: none; }
      .hero { padding: 40px 5vw 32px; }
      .hero-stats { gap: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    尾多多
    <span class="logo-badge">WDD</span>
  </div>
  <nav>
    <a href="index.html" class="active">产品目录</a>
    <a href="admin.html" class="admin-btn">🔧 后台管理</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-eyebrow">3C Electronics Supply List · Honduras</div>
  <h1>优质<span>3C</span>电子<br/>产品目录</h1>
  <p class="hero-sub">涵盖照明、按摩、家电、美容等多品类优质3C产品，直发洪都拉斯，40HQ装柜。</p>
  <div class="hero-stats">
    <div class="stat"><span class="stat-num" id="stat-total">27</span><span class="stat-label">总品类</span></div>
    <div class="stat"><span class="stat-num">40HQ</span><span class="stat-label">集装箱</span></div>
    <div class="stat"><span class="stat-num">29</span><span class="stat-label">托盘</span></div>
    <div class="stat"><span class="stat-num">$1–7.5</span><span class="stat-label">价格区间</span></div>
  </div>
</section>

<div class="filters-bar">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="搜索产品名称…" />
  </div>
  <div class="filter-btns">
    <button class="filt active" data-filter="all">全部</button>
    <button class="filt" data-filter="new">新品</button>
    <button class="filt" data-filter="hot">热销</button>
    <button class="filt" data-filter="inquiry">询价</button>
  </div>
  <select class="sort-select" id="sort">
    <option value="id">默认排序</option>
    <option value="price-asc">价格↑</option>
    <option value="price-desc">价格↓</option>
    <option value="name">名称A-Z</option>
  </select>
</div>

<main class="grid" id="grid"></main>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    <div class="modal-icon" id="m-icon"></div>
    <div class="modal-zh" id="m-zh"></div>
    <div class="modal-en" id="m-en"></div>
    <div class="modal-row"><span class="modal-label">编号</span><span class="modal-val" id="m-id"></span></div>
    <div class="modal-row"><span class="modal-label">类别</span><span class="modal-val">3C 电子</span></div>
    <div class="modal-row"><span class="modal-label">单位</span><span class="modal-val">pcs/件</span></div>
    <div class="modal-row"><span class="modal-label">目的地</span><span class="modal-val">Honduras 🇭🇳</span></div>
    <div class="modal-row">
      <span class="modal-label">报价</span>
      <span class="modal-price" id="m-price"></span>
    </div>
  </div>
</div>

<footer>
  <div class="copy">© 2026 尾多多 WeiDuoDuo · 3C Supply Chain</div>
  <div class="ship">发货日期 <span>4/10/2026</span> · 集装箱 <span>40HQ · 29托盘</span></div>
</footer>

<script src="products.js"></script>
<script>
let activeFilter = 'all';
let searchQuery = '';
let sortMode = 'id';

function getBadge(tag) {
  if (tag === '新品') return '<div class="badge badge-new">NEW</div>';
  if (tag === '热销') return '<div class="badge badge-hot">HOT</div>';
  if (tag === '精品') return '<div class="badge badge-premium">精品</div>';
  if (tag === '询价') return '<div class="badge badge-inquiry">询价</div>';
  return '';
}

function renderGrid() {
  let list = [...products];

  if (searchQuery) {
    list = list.filter(p =>
      p.nameZh.includes(searchQuery) || p.nameEn.toLowerCase().includes(searchQuery.toLowerCase())
    );
  }
  if (activeFilter === 'new') list = list.filter(p => p.tag === '新品');
  if (activeFilter === 'hot') list = list.filter(p => p.tag === '热销');
  if (activeFilter === 'inquiry') list = list.filter(p => p.tag === '询价');

  if (sortMode === 'price-asc') list.sort((a,b) => (a.price||99) - (b.price||99));
  if (sortMode === 'price-desc') list.sort((a,b) => (b.price||0) - (a.price||0));
  if (sortMode === 'name') list.sort((a,b) => a.nameEn.localeCompare(b.nameEn));

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">🔍 没有找到匹配产品</div>';
    return;
  }

  grid.innerHTML = list.map((p, i) => `
    <div class="card" style="animation-delay:${i * 0.04}s" onclick="openModal(${p.id})">
      <div class="card-img">
        ${p.icon}
        ${getBadge(p.tag)}
      </div>
      <div class="card-body">
        <div class="card-id"># ${String(p.id).padStart(2,'0')}</div>
        <div class="card-name-zh">${p.nameZh}</div>
        <div class="card-name-en">${p.nameEn}</div>
        <div class="card-footer">
          ${p.price !== null
            ? `<div class="price"><sup>$</sup>${p.price.toFixed(1)}</div>`
            : `<div class="price-tbd">价格待询</div>`}
          <div class="unit-tag">${p.unit}</div>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('stat-total').textContent = list.length;
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  document.getElementById('m-icon').textContent = p.icon;
  document.getElementById('m-zh').textContent = p.nameZh;
  document.getElementById('m-en').textContent = p.nameEn;
  document.getElementById('m-id').textContent = `#${String(p.id).padStart(2,'0')}`;
  document.getElementById('m-price').textContent = p.price !== null ? `$${p.price.toFixed(2)}` : '待询价';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderGrid();
});

document.querySelectorAll('.filt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderGrid();
  });
});

document.getElementById('sort').addEventListener('change', e => {
  sortMode = e.target.value;
  renderGrid();
});

renderGrid();
</script>
</body>
</html>
