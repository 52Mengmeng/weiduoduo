body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
}

/* HEADER */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-size: 1.1rem; font-weight: 900; display: flex; align-items: center; gap: 8px; }
.logo-badge { font-size: 0.5rem; color: var(--red); font-weight: 700; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; border: 1px solid var(--red); }
.header-right { display: flex; gap: 10px; align-items: center; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.82rem; font-family: inherit; cursor: pointer; transition: all 0.2s; }
.btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { background: #c1121f; }

/* HERO */
.hero {
  padding: 40px 24px 24px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.hero h1 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
.hero p { color: var(--muted); font-size: 0.9rem; }
.hero-badge {
  display: inline-block;
  background: rgba(230,57,70,0.15);
  color: var(--red);
  border: 1px solid rgba(230,57,70,0.3);
  padding: 4px 14px; border-radius: 20px;
  font-size: 0.75rem; margin-bottom: 16px;
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: 0.05em;
}

/* FILTERS */
.filters {
  padding: 16px 24px;
  display: flex; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.filter-label { font-size: 0.75rem; color: var(--muted); margin-right: 4px; }
.filter-btn {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 0.8rem;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.filter-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

.search-box {
  margin-left: auto;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 7px 14px;
  font-size: 0.82rem; font-family: inherit; outline: none;
  transition: border-color 0.2s; width: 200px;
}
.search-box:focus { border-color: var(--red); }

/* PRODUCT GRID */
.grid-wrap { padding: 24px; }
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.product-card:hover {
  border-color: rgba(255,255,255,0.15);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.card-icon {
  font-size: 2.4rem;
  margin-bottom: 12px;
  display: block;
}
.card-tag {
  display: inline-block;
  font-size: 0.65rem; font-weight: 700;
  padding: 2px 8px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.tag-新品 { background: var(--red); color: #fff; }
.tag-热销 { background: var(--gold); color: #000; }
.tag-精品 { background: linear-gradient(135deg, #8B5CF6, #6366F1); color: #fff; }
.tag-询价 { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.card-name-zh {
  font-size: 0.95rem; font-weight: 600;
  margin-bottom: 4px; line-height: 1.4;
}
.card-name-en {
  font-size: 0.72rem; color: var(--muted);
  margin-bottom: 12px; line-height: 1.5;
}
.card-price {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.3rem; font-weight: 700; color: var(--red);
}
.card-price-tbd {
  font-size: 0.8rem; color: var(--muted); font-style: italic;
}
.card-category {
  position: absolute; top: 12px; right: 12px;
  font-size: 0.65rem; color: var(--muted);
  background: var(--surface2); padding: 2px 8px;
  border-radius: 4px; border: 1px solid var(--border);
}

/* EMPTY STATE */
.empty { text-align: center; padding: 60px 24px; color: var(--muted); }
.empty-icon { font-size: 3rem; margin-bottom: 12px; }

/* STATS BAR */
.stats-bar {
  padding: 10px 24px;
  font-size: 0.78rem; color: var(--muted);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 20px; align-items: center;
}
.stats-bar span { color: var(--text); font-weight: 500; }

/* FOOTER */
footer {
  text-align: center; padding: 32px 24px;
  border-top: 1px solid var(--border);
  font-size: 0.78rem; color: var(--muted);
  margin-top: 40px;
}

/* NOTICE */
.notice-bar {
  background: rgba(230,57,70,0.08);
  border-bottom: 1px solid rgba(230,57,70,0.15);
  padding: 10px 24px;
  font-size: 0.78rem; color: #cc7777;
  text-align: center;
}

@media (max-width: 600px) {
  .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .hero h1 { font-size: 1.4rem; }
  .search-box { width: 100%; margin-left: 0; margin-top: 8px; }
  .filters { flex-direction: column; align-items: flex-start; }
}

<header>

    <span style="font-size:0.72rem;color:var(--muted);font-weight:400;">/ 商品列表</span>

<!-- NOTICE -->

<div class="notice-bar">
  ⚠ 所有商品一律不退不换 · All Sales Final · No Returns · No Exchanges
</div>

<!-- HERO -->

<div class="hero">
  <div class="hero-badge">NORTH AMERICA CLEARANCE · DIRECT TO YOU</div>
  <h1>全部商品</h1>
  <p>北美正品库存直销 · 省去中间商 · 价格透明</p >
</div>

<!-- FILTERS -->

<div class="filters">
  <span class="filter-label">筛选：</span>
  <button class="filter-btn active" onclick="filterBy('all')">全部</button>
  <button class="filter-btn" onclick="filterBy('新品')">🆕 新品</button>
  <button class="filter-btn" onclick="filterBy('热销')">🔥 热销</button>
  <button class="filter-btn" onclick="filterBy('精品')">✨ 精品</button>
  <button class="filter-btn" onclick="filterBy('3C')">🖥️ 3C电子</button>
  <button class="filter-btn" onclick="filterBy('家居')">🏠 家居灯具</button>
  <button class="filter-btn" onclick="filterBy('厨房')">🍳 厨房用品</button>
  <input class="search-box" type="text" id="searchBox" placeholder="🔍 搜索商品..." oninput="onSearch()" />
</div>

<!-- STATS -->

<div class="stats-bar" id="statsBar">
  共 <span id="countSpan">-</span> 件商品
</div>

<!-- GRID -->

<div class="grid-wrap">
  <div class="product-grid" id="productGrid"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="empty-icon">🔍</div>
    <div>没有找到相关商品</div>
  </div>
</div>

<!-- FOOTER -->

<footer>
  尾多多 WEIDUODUO.SHOP · 北美正品库存直销<br>
  © 2025 All Sales Final · No Returns · No Exchanges
</footer>

<script src="products.js"></script>

<script>
  let currentFilter = 'all';
  let currentSearch = '';

  function getFiltered() {
    return products.filter(p => {
      const matchFilter =
        currentFilter === 'all' ? true :
        currentFilter === '3C' ? p.category === '3C' :
        currentFilter === '家居' ? p.category === '家居' :
        currentFilter === '厨房' ? p.category === '厨房' :
        p.tag === currentFilter;

      const q = currentSearch.toLowerCase();
      const matchSearch = !q ||
        p.nameZh.toLowerCase().includes(q) ||
        p.nameEn.toLowerCase().includes(q);
    
      return matchFilter && matchSearch;
    });
  }

  function renderGrid() {
    const filtered = getFiltered();
    const grid = document.getElementById('productGrid');
    const empty = document.getElementById('emptyState');
    const countSpan = document.getElementById('countSpan');

    countSpan.textContent = filtered.length;
    
    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    
    grid.innerHTML = filtered.map(p => `
      <div class="product-card">
        <span class="card-category">${p.category}</span>
        <span class="card-icon">${p.icon || '📦'}</span>
        ${p.tag ? `<span class="card-tag tag-${p.tag}">${p.tag}</span>` : ''}
        <div class="card-name-zh">${p.nameZh}</div>
        <div class="card-name-en">${p.nameEn}</div>
        ${p.price !== null && p.price !== undefined
          ? `<div class="card-price">$${Number(p.price).toFixed(2)}</div>`
          : `<div class="card-price-tbd">价格待询</div>`
        }
      </div>
    `).join('');
  }

  function filterBy(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderGrid();
  }

  function onSearch() {
    currentSearch = document.getElementById('searchBox').value;
    renderGrid();
  }

  // Init
  renderGrid();
</script>

</body>
