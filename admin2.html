<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WeiDuoDuo Admin</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#f5f5f5;display:flex;min-height:100vh}.side{width:190px;background:#1a1a2e;color:#fff;flex-shrink:0}.logo{padding:20px;font-size:1.1rem;font-weight:900;border-bottom:1px solid rgba(255,255,255,.1);color:#e85d26}.menu a{display:block;padding:13px 20px;color:rgba(255,255,255,.6);text-decoration:none;font-size:.88rem}.menu a:hover{background:rgba(232,93,38,.2);color:#fff}.con{flex:1;padding:28px}.h1{font-size:1.4rem;font-weight:900;margin-bottom:22px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}.stat{background:#fff;border-radius:10px;padding:18px 20px}.sn{font-size:1.8rem;font-weight:900;color:#e85d26}.sl{font-size:.78rem;color:#999}.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px}.card h2{font-size:.95rem;font-weight:700;margin-bottom:16px}.zone{border:2px dashed #ddd;border-radius:10px;padding:36px;text-align:center;cursor:pointer;position:relative}.zone:hover{border-color:#e85d26;background:#fff8f5}.zone input{position:absolute;inset:0;opacity:0;cursor:pointer}.prev{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.thumb{width:72px;height:72px;border-radius:7px;overflow:hidden;border:2px solid #eee}.thumb img{width:100%;height:100%;object-fit:cover}.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.fg label{font-size:.75rem;font-weight:600;color:#555;display:block;margin-bottom:4px}.fg input,.fg select{width:100%;border:1px solid #ddd;border-radius:7px;padding:8px 11px;font-size:.84rem;font-family:inherit;outline:none}.sbtn{margin-top:16px;background:#e85d26;color:#fff;border:none;padding:11px 28px;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer}table{width:100%;border-collapse:collapse}th{text-align:left;padding:9px 12px;font-size:.7rem;color:#999;border-bottom:2px solid #f0f0f0}td{padding:11px 12px;border-bottom:1px solid #f5f5f5;font-size:.84rem;vertical-align:middle}.ti{width:44px;height:44px;border-radius:6px;object-fit:cover}.db{background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:5px}.db:hover{background:#fff0eb}</style></head><body><div class="side"><div class="logo">WeiDuoDuo Admin</div><div class="menu"><a href=" " onclick="tab(1)">+ Add Product</a ><a href="#" onclick="tab(2)">List Products</a ><a href="index.html" target="_blank">View Shop</a ></div></div><div class="con"><div class="h1" id="tt">Add Product</div><div class="stats"><div class="stat"><div class="sn" id="s1">0</div><div class="sl">Total</div></div><div class="stat"><div class="sn" id="s2">0</div><div class="sl">Categories</div></div><div class="stat"><div class="sn" id="s3">0</div><div class="sl">Pet Items</div></div></div><div id="d1"><div class="card"><h2>Upload Images</h2><div class="zone"><input type="file" accept="image/*" multiple onchange="loadImg(event)"><div style="font-size:2rem;margin-bottom:8px">photo</div><p style="color:#999;font-size:.88rem">Click to upload images</p ></div><div class="prev" id="prev"></div></div><div class="card"><h2>Product Info</h2><div class="fg"><div><label>Name</label><input id="pn" placeholder="Product name"></div><div><label>Category</label><select id="pc"><option value="">Select</option><option>Womens Fashion</option><option>Shoes</option><option>Bags</option><option>Jewelry</option><option>Scarves</option><option>Outerwear</option><option>Home Goods</option><option>Mixed Batch</option><option>Pet Supplies</option><option>Pet Harness</option><option>Pet Collar</option><option>Pet Toys</option><option>Pet Treats</option><option>Pet Clothing</option></select></div><div><label>Price (USD)</label><input id="pp" type="number" placeholder="29.99"></div><div><label>Tag</label><input id="ptag" placeholder="New/Sale"></div></div><button class="sbtn" onclick="save()">Save Product</button></div></div><div id="d2" style="display:none"><div class="card"><h2>Product List</h2><table><thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Del</th></tr></thead><tbody id="tb"></tbody></table></div></div></div><script>var imgs=[];function gp(){try{return JSON.parse(localStorage.getItem("wdd")||"[]")}catch(e){return[]}}function sp(a){localStorage.setItem("wdd",JSON.stringify(a));upStats()}function upStats(){var p=gp();document.getElementById("s1").textContent=p.length;document.getElementById("s2").textContent=new Set(p.map(function(x){return x.cat}).filter(Boolean)).size;document.getElementById("s3").textContent=p.filter(function(x){return(x.cat||"").indexOf("Pet")>-1}).length}function tab(n){document.getElementById("d1").style.display=n===1?"block":"none";document.getElementById("d2").style.display=n===2?"block":"none";document.getElementById("tt").textContent=n===1?"Add Product":"Product List";if(n===2)renderTable()}function loadImg(e){imgs=[];var p=document.getElementById("prev");p.innerHTML="";Array.from(e.target.files).forEach(function(f,i){var r=new FileReader();r.onload=function(ev){imgs[i]=ev.target.result;var d=document.createElement("div");d.className="thumb";d.innerHTML="< img src="+ev.target.result+">";p.appendChild(d)};r.readAsDataURL(f)})}function save(){var n=document.getElementById("pn").value.trim(),p=document.getElementById("pp").value;if(!n||!p){alert("Please fill name and price");return}var arr=gp(),vi=imgs.filter(Boolean);if(!vi.length){arr.push({id:Date.now(),name:n,cat:document.getElementById("pc").value,price:parseFloat(p),tag:document.getElementById("ptag").value,img:""});sp(arr);alert("Saved!")}else{vi.forEach(function(img,i){arr.push({id:Date.now()+i,name:vi.length>1?n+" ("+(i+1)+")":n,cat:document.getElementById("pc").value,price:parseFloat(p),tag:document.getElementById("ptag").value,img:img})});sp(arr);alert("Saved "+vi.length+" products!")}["pn","pp","ptag"].forEach(function(id){document.getElementById(id).value=""});document.getElementById("pc").value="";document.getElementById("prev").innerHTML="";imgs=[]}function renderTable(){var p=gp(),tb=document.getElementById("tb");tb.innerHTML=p.length?p.map(function(x,i){return"<tr><td>"+(x.img?"< img class=ti src="+x.img+">":"box")+"</td><td>"+x.name+"</td><td>"+(x.cat||"-")+"</td><td>$"+x.price+"</td><td><button class=db onclick=del("+i+")>X</button></td></tr>"}).join(""):"<tr><td colspan=5 style=text-align:center;padding:30px;color:#ccc>No products</td></tr>"}function del(i){if(!confirm("Delete?"))return;var p=gp();p.splice(i,1);sp(p);renderTable()}upStats()</script></body></html>
